# =============================================================================
# render.yaml — RxLens single-service deployment
# One Docker web service runs both FastAPI backend + Next.js frontend.
# Commit this file to the ROOT of your repository.
# =============================================================================

services:
  # ── Single Docker web service (frontend + backend in one container) ─────────
  - type: web
    name: rxlens-app
    runtime: docker
    dockerfilePath: Dockerfile        # root-level Dockerfile
    plan: free
    healthCheckPath: /api/v1/health

    envVars:
      # ── App ──────────────────────────────────────────────────────────────────
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true

      # ── AI Provider ──────────────────────────────────────────────────────────
      - key: MODEL_PROVIDER
        value: fallback
      - key: FALLBACK_CHAIN
        value: "gemini:gemini-2.0-flash-lite,gemini:gemini-2.5-flash"

      # ── API Keys (enter in Render dashboard — never commit real keys) ─────────
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

      # ── OCR ──────────────────────────────────────────────────────────────────
      - key: OCR_PROVIDER
        value: tesseract
      - key: TESSERACT_CMD
        value: /usr/bin/tesseract

      # ── Database (link a Render Postgres service for persistence) ─────────────
      # Comment this block out if you don't want a database on the free tier.
      - key: DATABASE_URL
        fromDatabase:
          name: rxlens-db
          property: connectionString

      # ── CORS (frontend is on same container, but allow localhost for dev) ─────
      - key: CORS_ORIGINS
        value: '["http://localhost:3000","https://rxlens-app.onrender.com"]'

      # ── Storage ──────────────────────────────────────────────────────────────
      - key: UPLOAD_DIR
        value: /app/backend/uploads
      - key: MAX_UPLOAD_SIZE_MB
        value: "10"
      - key: VECTOR_DB_ENABLED
        value: "true"
      - key: CHROMA_PERSIST_DIR
        value: /app/backend/chroma_db

      # ── Frontend env (passed through to Node.js server) ──────────────────────
      - key: NEXT_PUBLIC_API_URL
        value: http://localhost:8000       # internal — same container

      # ── Python ───────────────────────────────────────────────────────────────
      - key: PYTHONUNBUFFERED
        value: "1"

# ── Database (optional — comment out to avoid free-tier limit) ────────────────
databases:
  - name: rxlens-db
    plan: free
    databaseName: rxlens
    user: rxlens
